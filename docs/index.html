<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Awesome Electrical Grid Mapping — Explorer</title>
  <meta name="description" content="Browse open electrical-grid maps, datasets and capacity data for (almost) every country, state and province." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="map" tabindex="-1"></div>

  <header class="topbar">
    <div class="brand">
      <div class="brand-text">
        <span class="t">Grid Data Explorer</span>
      </div>
      <div class="brand-logos">
        <a class="logo" href="https://mapyourgrid.org/" target="_blank" rel="noopener" title="MapYourGrid Initiative">
          <img src="img/mapyourgrid-logo.png" alt="MapYourGrid logo" />
        </a>
        <a class="logo oet" href="https://openenergytransition.org/" target="_blank" rel="noopener" title="Open Energy Transition">
          <img src="img/oet-logo.svg" alt="Open Energy Transition logo" />
        </a>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><span class="n" id="s-countries">–</span><span class="l">Countries</span></div>
      <div class="stat"><span class="n" id="s-datasets">–</span><span class="l">Resources</span></div>
      <div class="stat"><span class="n" id="s-capacity">–</span><span class="l">Capacity</span></div>
    </div>
    <div class="spacer"></div>
    <div class="search">
      <span class="ico">⌕</span>
      <input id="search" type="text" placeholder="Search country, state or province…  ( / )"
             autocomplete="off" spellcheck="false" />
      <div class="results" id="results"></div>
    </div>
    <a class="btn" id="contribute"
       href="https://github.com/open-energy-transition/Awesome-Electrical-Grid-Mapping/issues/new?title=Add+dataset%3A+&body=%2A%2ACountry+or+region%3A%2A%2A+%0A%2A%2ALink+to+dataset%3A%2A%2A+%0A%2A%2AYear+of+publication+or+last+update%3A%2A%2A+%0A%2A%2ALicense+type%3A%2A%2A+%0A%2A%2ATags%3A%2A%2A+%28capacitydata+%7C+dataset+%7C+map+%7C+report%29"
       target="_blank" rel="noopener" title="Suggest a new dataset to add to the list">＋ Contribute<span class="hide-sm">&nbsp;a dataset</span></a>
    <div class="downloadwrap">
      <button class="btn btn-primary" id="download-csv" title="Download all datasets as CSV">↓&nbsp;<span class="hide-sm">Download as&nbsp;</span>CSV</button>
      <a class="cc-badge" href="https://creativecommons.org/publicdomain/zero/1.0/" target="_blank" rel="noopener"
         title="Data released under CC0 1.0 – Public Domain Dedication">
        <svg viewBox="0 0 48 24" width="34" height="17" aria-hidden="true">
          <circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.4" />
          <text x="12" y="16" text-anchor="middle" font-size="10" font-family="Arial, sans-serif" fill="currentColor">CC</text>
          <circle cx="34" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="1.4" />
          <text x="34" y="16" text-anchor="middle" font-size="11" font-family="Arial, sans-serif" fill="currentColor">0</text>
        </svg>
      </a>
    </div>
    <a class="icon-btn" href="https://github.com/open-energy-transition/Awesome-Electrical-Grid-Mapping"
       target="_blank" rel="noopener" title="View source on GitHub" aria-label="View source on GitHub">
      <svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </header>

  <aside class="legend">
    <h4>Coverage (resources / country)</h4>
    <div class="cov" id="legend-cov"></div>
    <div class="covlabels"><span>1</span><span>21+</span></div>
    <div class="hint">● capacity data · dashed = state / province · click any region for links</div>
  </aside>

  <section class="panel" id="panel" aria-label="Region datasets">
    <div class="head">
      <button class="close" aria-label="Close">✕</button>
      <h2 class="title">—</h2>
      <div class="sub"></div>
      <div class="typebar"></div>
    </div>
    <div class="body"></div>
  </section>

  <div class="loading" id="loading">
    <div class="ring"></div>
    <div>Loading grid data…</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
